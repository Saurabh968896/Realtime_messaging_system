<!DOCTYPE html>
<html>
<head>
<title>Chat App</title>

<style>
body { font-family: Arial; background:#ece5dd; }

.container {
  width:420px;
  margin:20px auto;
  background:#f0f0f0;
  border-radius:10px;
  overflow:hidden;
}

.header { background:#075e54; color:white; padding:10px; }

.chat-box {
  height:450px;
  overflow-y:auto;
  padding:10px;
  background:#e5ddd5;
}

.message {
  max-width:70%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  word-break: break-word;
}

.sent {
  background:#dcf8c6;
  margin-left:auto;
  margin-right:0;
  text-align:left;
}

.received {
  background:white;
  margin-left:0;
  margin-right:auto;
}

.timestamp {
  font-size:10px;
  color:#999;
  margin-top:3px;
  text-align:right;
}

.input-box { display:flex; padding:10px; gap:5px; }
.input-box input { flex:1; padding:8px; border-radius:5px; border:1px solid #ccc; }
.input-box button { padding:8px 14px; background:#075e54; color:white; border:none; border-radius:5px; cursor:pointer; }
</style>
</head>

<body>

<div class="container">

<div class="header">
  <input id="userInput" placeholder="Login">
  <button onclick="login()">Login</button><br><br>

  <input id="chatUserInput" placeholder="Chat with">
  <button onclick="startChat()">Start</button>

  <div id="status"></div>
</div>

<div id="chat" class="chat-box"></div>

<div class="input-box">
  <input id="messageInput" onkeydown="if(event.key==='Enter') sendMessage()">
  <button onclick="sendMessage()">Send</button>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const supabaseClient = supabase.createClient(
  "https://ozleredzqriuzkhpuwct.supabase.co",
  "sb_publishable_uJOnUQP3CsD6_UzAfMcbbw_01SekNc7"
);

let userId = "";
let conversationId = "";

// ================= LOGIN =================
async function login() {
  userId = document.getElementById("userInput").value.trim().toLowerCase();

  const { data } = await supabaseClient.from("users").select("*").eq("id", userId);

  if (!data.length) {
    await supabaseClient.from("users").insert([{ id: userId }]);
  }

  document.getElementById("status").innerText = "Logged in: " + userId;
}

// ================= START CHAT =================
async function startChat() {
  const other = document.getElementById("chatUserInput").value.trim().toLowerCase();

  const { data } = await supabaseClient
    .from("conversations")
    .select("*")
    .or(`and(user1_id.eq.${userId},user2_id.eq.${other}),and(user1_id.eq.${other},user2_id.eq.${userId})`);

  if (data.length) {
    conversationId = data[0].id;
  } else {
    const { data: newConv } = await supabaseClient
      .from("conversations")
      .insert([{ user1_id: userId, user2_id: other }])
      .select();

    conversationId = newConv[0].id;
  }

  await loadMessages();
}

// ================= FORMAT TIME =================
function formatTime(isoString) {
  const date = new Date(isoString);
  let hours = date.getHours();
  let minutes = date.getMinutes();
  const ampm = hours >= 12 ? "PM" : "AM";
  hours = hours % 12 || 12;
  minutes = minutes < 10 ? "0" + minutes : minutes;
  return hours + ":" + minutes + " " + ampm;
}

// ================= LOAD MESSAGES (SORTED BY TIME) =================
async function loadMessages() {
  const { data, error } = await supabaseClient
    .from("messages")
    .select("*")
    .eq("conversation_id", conversationId)
    .order("created_at", { ascending: true }); // ✅ Sort by real timestamp

  if (error) {
    console.error(error);
    return;
  }

  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  data.forEach(msg => {
    const wrapper = document.createElement("div");
    wrapper.style.display = "flex";
    wrapper.style.flexDirection = "column";
    wrapper.style.alignItems = msg.sender_id === userId ? "flex-end" : "flex-start";
    wrapper.style.margin = "4px 0";

    const div = document.createElement("div");
    div.classList.add("message");
    div.classList.add(msg.sender_id === userId ? "sent" : "received");
    div.innerText = msg.message_text;

    const time = document.createElement("div");
    time.classList.add("timestamp");
    time.innerText = msg.created_at ? formatTime(msg.created_at) : "";

    wrapper.appendChild(div);
    wrapper.appendChild(time);
    chat.appendChild(wrapper);
  });

  chat.scrollTop = chat.scrollHeight;
}

// ================= SEND =================
async function sendMessage() {
  const text = document.getElementById("messageInput").value.trim();

  if (!text || !conversationId) return;

  // ✅ created_at is set automatically by Supabase (set default to now() in your table)
  await supabaseClient.from("messages").insert([{
    conversation_id: conversationId,
    sender_id: userId,
    message_text: text,
    seen: false
  }]);

  document.getElementById("messageInput").value = "";

  await loadMessages();
}

// ================= REALTIME =================
supabaseClient
  .channel("chat")
  .on("postgres_changes", {
    event: "INSERT",
    schema: "public",
    table: "messages"
  }, async (payload) => {
    const msg = payload.new;
    if (msg.conversation_id === conversationId) {
      await loadMessages(); // ✅ Always reload for correct order
    }
  })
  .subscribe();

</script>

</body>
</html>
